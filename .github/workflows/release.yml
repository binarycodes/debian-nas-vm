name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3)'
        required: true

jobs:
  open-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: bump version in control file
        run: |
          sed -i "s/^Version: .*/Version: ${{ github.event.inputs.version }}/" packaging/DEBIAN/control

      - name: open pull request
        uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          branch: release/v${{ github.event.inputs.version }}
          title: "release: v${{ github.event.inputs.version }}"
          body: "Automated release PR for v${{ github.event.inputs.version }}. Merging this PR will build and publish the release."
          commit-message: "release: bump version to ${{ github.event.inputs.version }}"
