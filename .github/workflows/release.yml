name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3)'
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tests
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: lint and test
        run: make validate

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: bump version and tag
        run: |
          sed -i "s/^Version: .*/Version: ${{ github.event.inputs.version }}/" packaging/DEBIAN/control
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/DEBIAN/control
          git commit -m "release v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin HEAD:${{ github.ref_name }} "v${{ github.event.inputs.version }}"

      - name: build deb
        run: bash packaging/build.sh

      - name: create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          draft: true
          files: cloudyhome-nas_${{ github.event.inputs.version }}_all.deb
