name: Build deb

on:
  workflow_run:
    workflows: ["Validate"]
    types:
      - completed

concurrency:
  group: build-deb-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build-deb:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deb
        run: bash packaging/build.sh
